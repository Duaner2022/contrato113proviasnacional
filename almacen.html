    <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almacén y Obligaciones | Contrato 113</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { background-color: #f4f6f9; padding-bottom: 80px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card-box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .badge-pendiente { background-color: #dc3545; color: white; }
        .badge-proceso { background-color: #ffc107; color: black; }
        .badge-cumplido { background-color: #28a745; color: white; }
        .navbar-custom { background-color: #343a40; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 1.2rem; }
        .btn-accion { margin-right: 5px; margin-bottom: 5px; }
        .table-responsive { overflow-x: auto; }
    </style>
</head>
<body>

    <div class="navbar-custom">
        <i class="fas fa-warehouse"></i> CONTROL DE ALMACÉN Y OBLIGACIONES - CONTRATO 113
    </div>

    <div class="container mt-4">
        
        <div class="card-box">
            <h4 class="mb-3 text-primary"><i class="fas fa-tasks"></i> Obligaciones Contractuales</h4>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Item</th>
                            <th>Obligación</th>
                            <th>Vencimiento</th>
                            <th>Plazo</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpo-obligaciones">
                        </tbody>
                </table>
            </div>
            <button onclick="enviarWhatsAppObligaciones()" class="btn btn-success mt-2">
                <i class="fab fa-whatsapp"></i> Reportar Alertas de Plazos
            </button>
        </div>

        <hr>

        <div class="card-box">
            <h4 class="mb-3 text-success"><i class="fas fa-box"></i> Inventario Lote 1</h4>
            <div class="mb-3">
                <input type="text" id="buscadorInput" onkeyup="filtrarTabla()" class="form-control" placeholder="🔍 Buscar por nombre de componente...">
            </div>
            <div class="table-responsive">
                <table class="table table-striped table-bordered" id="tabla-lote1">
                    <thead class="table-secondary">
                        <tr>
                            <th>Código</th>
                            <th>Componente</th>
                            <th>Cant. Contrato</th>
                            <th>Recibido</th>
                            <th>Falta</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpo-lote1">
                        </tbody>
                </table>
            </div>
            <div class="mt-3">
                <button onclick="exportarExcel()" class="btn btn-outline-success btn-accion"><i class="fas fa-file-excel"></i> Excel</button>
                <button onclick="exportarPDF()" class="btn btn-outline-danger btn-accion"><i class="fas fa-file-pdf"></i> PDF</button>
                <button onclick="imprimirTabla()" class="btn btn-outline-dark btn-accion"><i class="fas fa-print"></i> Imprimir</button>
            </div>
        </div>
    </div>

    <script>
        async function cargarObligaciones() {
            const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT1p2M3Y-Yj6C0T5-lM9mKq1f8uR0iK-lXp-vG7_V0qN5R-u-yX7YvK-q-L8N-yX_X_R-vG7_V0qN5R/pub?gid=0&output=csv&cache=" + new Date().getTime();
            
            try {
                const respuesta = await fetch(url);
                const datos = await respuesta.text();
                const filas = datos.split("\n").slice(1);
                const cuerpoTabla = document.getElementById("cuerpo-obligaciones");
                cuerpoTabla.innerHTML = "";

                filas.forEach(linea => {
                    const fila = linea.split(",");
                    if (fila.length >= 5) {
                        const item = fila[0];
                        const obligacion = fila[1];
                        const fechaVenc = fila[2];
                        const estado = fila[4] ? fila[4].trim() : "";
                        
                        let diasTexto = "-";
                        let diasBadgeClass = "bg-light text-dark";

                        if (estado.toLowerCase() !== "cumplido" && fechaVenc && fechaVenc.includes("/")) {
                            const partes = fechaVenc.split('/');
                            const fechaObjeto = new Date(partes[2], partes[1] - 1, partes[0]);
                            const hoy = new Date();
                            hoy.setHours(0,0,0,0);
                            const diferencia = fechaObjeto - hoy;
                            const dias = Math.ceil(diferencia / (1000 * 60 * 60 * 24));

                            if (!isNaN(dias)) {
                                if (dias <= 0) { diasTexto = "Vencido"; diasBadgeClass = "bg-danger text-white"; }
                                else if (dias <= 3) { diasTexto = dias + " días"; diasBadgeClass = "bg-warning text-dark"; }
                                else { diasTexto = dias + " días"; diasBadgeClass = "bg-info text-white"; }
                            }
                        }

                        let badgeClass = "bg-secondary";
                        const est = estado.toLowerCase();
                        if (est.includes("pendiente")) badgeClass = "badge-pendiente";
                        if (est.includes("proceso")) badgeClass = "badge-proceso";
                        if (est.includes("cumplido") || est.includes("ok")) badgeClass = "badge-cumplido";

                        cuerpoTabla.innerHTML += `
                            <tr>
                                <td>${item}</td>
                                <td class="fw-bold">${obligacion}</td>
                                <td>${fechaVenc}</td>
                                <td><span class="badge ${diasBadgeClass}">${diasTexto}</span></td>
                                <td><span class="badge ${badgeClass}">${estado}</span></td>
                            </tr>`;
                    }
                });
            } catch (error) { console.error("Error Obligaciones:", error); }
        }

        async function cargarLote1() {
            const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT1p2M3Y-Yj6C0T5-lM9mKq1f8uR0iK-lXp-vG7_V0qN5R-u-yX7YvK-q-L8N-yX_X_R-vG7_V0qN5R/pub?gid=1510344498&output=csv";
            try {
                const respuesta = await fetch(url);
                const datos = await respuesta.text();
                const filas = datos.split("\n").slice(1);
                const cuerpoTabla = document.getElementById("cuerpo-lote1");
                cuerpoTabla.innerHTML = "";

                filas.forEach(linea => {
                    const fila = linea.split(",");
                    if (fila.length >= 5) {
                        const falta = parseInt(fila[4]);
                        const rowClass = falta > 0 ? "table-warning" : "";
                        cuerpoTabla.innerHTML += `
                            <tr class="${rowClass}">
                                <td>${fila[1]}</td>
                                <td>${fila[2]}</td>
                                <td>${fila[3]}</td>
                                <td class="text-success fw-bold">${fila[5] || '0'}</td>
                                <td class="text-danger fw-bold">${fila[4]}</td>
                            </tr>`;
                    }
                });
            } catch (error) { console.error("Error Lote 1:", error); }
        }

        function filtrarTabla() {
            let input = document.getElementById("buscadorInput").value.toUpperCase();
            let rows = document.getElementById("cuerpo-lote1").getElementsByTagName("tr");
            for (let i = 0; i < rows.length; i++) {
                let text = rows[i].getElementsByTagName("td")[1]?.textContent || "";
                rows[i].style.display = text.toUpperCase().includes(input) ? "" : "none";
            }
        }

        function exportarExcel() {
            const wb = XLSX.utils.table_to_book(document.getElementById('tabla-lote1'));
            XLSX.writeFile(wb, 'Inventario_Lote1.xlsx');
        }

        function exportarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = jsPDF();
            doc.text("Inventario Lote 1 - Contrato 113", 14, 15);
            doc.autoTable({ html: '#tabla-lote1', startY: 20 });
            doc.save('Inventario_Lote1.pdf');
        }

        function imprimirTabla() {
            const contenido = document.getElementById("tabla-lote1").outerHTML;
            const ventana = window.open('', '', 'height=600,width=800');
            ventana.document.write('<html><head><title>Imprimir</title><link href=\"https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css\" rel=\"stylesheet\"></head><body>');
            ventana.document.write('<div class=\"container mt-4\"><h4>Inventario Lote 1</h4>' + contenido + '</div></body></html>');
            ventana.document.close();
            setTimeout(() => { ventana.print(); ventana.close(); }, 1000);
        }

        function enviarWhatsAppObligaciones() {
            let mensaje = "*ALERTA OBLIGACIONES - dw*%0A%0A";
            const filas = document.getElementById("cuerpo-obligaciones").getElementsByTagName("tr");
            for (let row of filas) {
                const c = row.getElementsByTagName("td");
                if (!c[4].innerText.toLowerCase().includes("cumplido")) {
                    mensaje += `⚠️ *${c[1].innerText}*%0AVence: ${c[2].innerText} (${c[3].innerText})%0A%0A`;
                }
            }
            window.open(`https://wa.me/?text=${mensaje}`, '_blank');
        }

        cargarObligaciones();
        cargarLote1();
    </script>
</body>
</html>
