<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CONTROL 113 - PRESTACION ADICIONAL N°01</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; padding-bottom: 50px; }
        .header-blue { background: #0056b3; color: white; padding: 12px 20px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .card-custom { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 20px; padding: 15px; border-left: 5px solid #ffc107; }
        .table-scroll { max-height: 280px; overflow-y: auto; border: 1px solid #eee; }
        .badge-restante { background-color: #0dcaf0; color: white; border-radius: 12px; padding: 4px 10px; font-weight: bold; font-size: 0.85rem; }
        .text-limite { color: #dc3545; font-weight: bold; }
        .text-falta { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>

<div class="header-blue">
    <span><i class="fas fa-file-contract"></i> PANEL DE CONTROL CONTRATO 113 Y PRESTACIÓN ADICIONAL N°01</span>
    <span class="badge bg-light text-dark">dw</span>
</div>

<div class="container-fluid px-4">
    
    <div class="card-custom">
        <h5><i class="fas fa-calendar-check text-warning"></i> Control de Obligaciones Contrato 113 y Prestación Adicional N°01</h5>
        <div class="table-responsive">
            <table class="table table-hover align-middle" style="font-size: 0.85rem;">
                <thead class="table-light">
                    <tr><th>Item</th><th>Obligación</th><th>Límite</th><th>Presentación</th><th>Días</th><th>Estado</th></tr>
                </thead>
                <tbody id="tabla-obligaciones"></tbody>
            </table>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6">
            <div class="card-custom" style="border-left-color: #0d6efd;">
                <h6 class="text-primary fw-bold">Lote 1: Estructuras</h6>
                <div class="table-scroll"><table class="table table-sm table-striped"><tbody id="data-lote1"></tbody></table></div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card-custom" style="border-left-color: #6610f2;">
                <h6 style="color: #6610f2;" class="fw-bold">Lote 2: Estructuras</h6>
                <div class="table-scroll"><table class="table table-sm table-striped"><tbody id="data-lote2"></tbody></table></div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card-custom" style="border-left-color: #0dcaf0;">
                <h6 class="text-info fw-bold">Lote 3: Estructuras</h6>
                <div class="table-scroll"><table class="table table-sm table-striped"><tbody id="data-lote3"></tbody></table></div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card-custom" style="border-left-color: #dc3545;">
                <h6 class="text-danger fw-bold">Adicional</h6>
                <div class="table-scroll"><table class="table table-sm table-striped"><tbody id="data-adicional"></tbody></table></div>
            </div>
        </div>
    </div>

    <div class="row mt-3">
        <div class="col-md-6">
            <div class="card-custom" style="border-left-color: #198754;">
                <h6 class="text-success fw-bold">Herramientas LOTE 1</h6>
                <div class="table-scroll"><table class="table table-sm"><tbody id="herra-l1"></tbody></table></div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card-custom" style="border-left-color: #198754;">
                <h6 class="text-success fw-bold">Herramientas LOTE 3</h6>
                <div class="table-scroll"><table class="table table-sm"><tbody id="herra-l3"></tbody></table></div>
            </div>
        </div>
    </div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTw5wsNPW2SZyorWh9hOoHe2LcZgKkdpS29OziFQFPs-Oh1g9yCP8yNSVwAtk8SETKBbRkqmE47l_co/pub?output=csv';
    
    // GIDs EXTRAÍDOS DE TUS IMÁGENES
    const GIDS = {
        OBLIG: '0', 
        L1: '1555920355', 
        L2: '1584833780', // Corregido según imagen_167bff
        L3: '948956372', 
        ADIC: '404296762', // GID estimado para Adicional
        H1: '438228635',
        H3: '533666501'  // Corregido según imagen_14b20a
    };

    async function cargar(gid, elementId, modo) {
        try {
            const resp = await fetch(`${SHEET_URL}&gid=${gid}&t=${Date.now()}`);
            const data = await resp.text();
            const filas = data.split(/\r?\n/).filter(f => f.trim() !== "");
            let html = '';

            filas.slice(1).forEach(linea => {
                const c = linea.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(i => i.replace(/"/g, '').trim());
                if (c.length < 3) return;

                if (modo === 'oblig') {
                    const estClass = c[4] === 'Cumplido' ? 'bg-success' : 'bg-danger';
                    html += `<tr><td>${c[0]}</td><td>${c[1]}</td><td class="text-limite">${c[2]}</td><td>${c[3]||'-'}</td><td><span class="badge-restante">${c[5]||'-'}</span></td><td><span class="badge ${estClass}">${c[4]}</span></td></tr>`;
                } else {
                    const total = parseInt(c[2]) || 0;
                    const llego = parseInt(c[3]) || 0;
                    const falta = total - llego;
                    html += `<tr><td>${c[0]}</td><td>${c[1]}</td><td>${total}</td><td>${llego}</td><td class="text-danger fw-bold">${falta}</td><td>${falta===0?'🟢':'🔴'}</td></tr>`;
                }
            });
            document.getElementById(elementId).innerHTML = html || '<tr><td colspan="5">No hay datos</td></tr>';
        } catch (e) { console.error("Error en " + elementId); }
    }

    window.onload = () => {
        cargar(GIDS.OBLIG, 'tabla-obligaciones', 'oblig');
        cargar(GIDS.L1, 'data-lote1', 'lote');
        cargar(GIDS.L2, 'data-lote2', 'lote');
        cargar(GIDS.L3, 'data-lote3', 'lote');
        cargar(GIDS.ADIC, 'data-adicional', 'lote');
        cargar(GIDS.H1, 'herra-l1', 'lote');
        cargar(GIDS.H3, 'herra-l3', 'lote');
    };
</script>
</body>
</html>
