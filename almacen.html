<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almacén y Obligaciones | Contrato 113</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { background-color: #f4f6f9; padding-bottom: 80px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card-box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .header-almacen { background: linear-gradient(90deg, #0043a8 0%, #0d6efd 100%); color: white; padding: 15px 0; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .progress-bar { transition: width 1.5s ease-in-out; font-weight: bold; }
        .fila-kit { background-color: #e7f1ff !important; font-weight: bold; border-left: 4px solid #0d6efd; }
        .text-faltante { color: #dc3545; font-weight: 700; }
        .text-completo { color: #adb5bd; font-size: 0.9em; }
        .btn-action { font-size: 0.8rem; margin-right: 4px; margin-bottom: 5px; border-radius: 4px; }
        .btn-whatsapp { background-color: #25D366; color: white; border: none; }
        .btn-excel { background-color: #217346; color: white; border: none; }
        .badge-pendiente { background-color: #dc3545; color: white; }
        .badge-proceso { background-color: #ffc107; color: black; }
        .badge-cumplido { background-color: #198754; color: white; }
    </style>
</head>
<body>

    <div class="header-almacen">
        <div class="container d-flex justify-content-between align-items-center">
            <h4 class="m-0"><i class="fas fa-clipboard-list"></i> CONTROL 113 - dw</h4>
            <a href="index.html" class="btn btn-light btn-sm fw-bold shadow-sm"><i class="fas fa-home"></i> Inicio</a>
        </div>
    </div>

    <div class="container">
        <div class="card-box border-start border-4 border-warning" id="seccion-obligaciones">
            <h5><i class="far fa-calendar-alt text-warning"></i> Control de Obligaciones</h5>
            <div class="mb-2">
                <button onclick="enviarWhatsAppObligaciones()" class="btn btn-whatsapp btn-action"><i class="fab fa-whatsapp"></i> WhatsApp</button>
            </div>
            <div class="table-responsive">
                <table class="table table-sm" id="tabla-exportar-obligaciones">
                    <thead class="table-light">
                        <tr>
                            <th>Item</th><th>Obligación</th><th>Límite</th><th>Restan</th><th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-obligaciones"></tbody>
                </table>
            </div>
        </div>

        <div id="contenedor-lotes">
            </div>

        <div class="card-box border-top border-4 border-info">
            <h5><i class="fas fa-tools text-info"></i> Herramientas (Lote 1 y 3)</h5>
            <div id="contenedor-herramientas"></div>
        </div>
    </div>

    <script>
        const timestamp = new Date().getTime();
        const BASE_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTw5wsNPW2SZyorWh9hOoHe2LcZgKkdpS29OziFQFPs-Oh1g9yCP8yNSVwAtk8SETKBbRkqmE47l_co/pub?output=csv&t=' + timestamp;

        const CONFIG_LOTES = [
            { id: "1", nombre: "Lote 1: Estructuras", gid: "1555920355", color: "primary" },
            { id: "2", nombre: "Lote 2: Equipos", gid: "1584833780", color: "success" },
            { id: "3", nombre: "Lote 3: Materiales", gid: "948956372", color: "info" },
            { id: "adi", nombre: "Grid Adicional", gid: "404296762", color: "secondary" }
        ];

        const CONFIG_HERRAMIENTAS = [
            { nombre: "Herramientas Lote 1", gid: "438228635" },
            { nombre: "Herramientas Lote 3", gid: "533666501" }
        ];

        function parsearCSV(texto) {
            const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
            return texto.split(regex);
        }

        async function cargarLote(config) {
            const contenedor = document.getElementById('contenedor-lotes');
            const html = `
                <div class="card-box border-start border-4 border-${config.color}" id="sec-lote-${config.id}">
                    <h5 class="text-${config.color}">${config.nombre}</h5>
                    <div class="progress mb-3" style="height: 20px;">
                        <div id="barra-${config.id}" class="progress-bar bg-${config.color}" style="width: 0%;">0%</div>
                    </div>
                    <div class="table-responsive" style="max-height: 300px;">
                        <table class="table table-sm table-hover">
                            <thead class="table-light sticky-top">
                                <tr><th>Cód.</th><th>Descripción</th><th>Total</th><th>Llegó</th><th>Falta</th></tr>
                            </thead>
                            <tbody id="tabla-lote-${config.id}"></tbody>
                        </table>
                    </div>
                </div>`;
            contenedor.innerHTML += html;

            try {
                const res = await fetch(`${BASE_URL}&gid=${config.gid}`);
                const data = await res.text();
                const filas = data.split(/\r?\n/).slice(1);
                let tI = 0, tL = 0;
                let tbody = document.getElementById(`tabla-lote-${config.id}`);

                filas.forEach(f => {
                    let c = parsearCSV(f);
                    if(c.length < 4) return;
                    let tot = parseFloat(c[2]) || 0;
                    let lle = parseFloat(c[3]) || 0;
                    if(tot === 0 && lle === 0) return;
                    tI += tot; tL += lle;
                    let fal = tot - lle;
                    tbody.innerHTML += `<tr>
                        <td><small>${c[0]}</small></td>
                        <td>${c[1]}</td>
                        <td class="text-center">${tot}</td>
                        <td class="text-center fw-bold">${lle}</td>
                        <td class="text-center ${fal > 0 ? 'text-danger' : 'text-muted'}">${fal > 0 ? fal : '-'}</td>
                    </tr>`;
                });
                let p = tI > 0 ? Math.round((tL/tI)*100) : 0;
                document.getElementById(`barra-${config.id}`).style.width = p+'%';
                document.getElementById(`barra-${config.id}`).innerText = p+'% RECIBIDO';
            } catch (e) { console.error(e); }
        }

        async function cargarHerramientasSimple(conf) {
            const cont = document.getElementById('contenedor-herramientas');
            cont.innerHTML += `<h6 class="mt-3">${conf.nombre}</h6><div id="tabla-herr-${conf.gid}" class="small">Cargando...</div>`;
            try {
                const res = await fetch(`${BASE_URL}&gid=${conf.gid}`);
                const data = await res.text();
                const filas = data.split(/\r?\n/).slice(1);
                let html = '<table class="table table-striped table-sm"><thead><tr><th>Herramienta</th><th>Total</th><th>Llegó</th></tr></thead><tbody>';
                filas.forEach(f => {
                    let c = parsearCSV(f);
                    if(c.length < 4) return;
                    html += `<tr><td>${c[1]}</td><td>${c[2]}</td><td>${c[3]}</td></tr>`;
                });
                document.getElementById(`tabla-herr-${conf.gid}`).innerHTML = html + '</tbody></table>';
            } catch (e) {}
        }

        // Ejecución inicial
        async function iniciar() {
            // Cargar Lotes
            for(let lote of CONFIG_LOTES) { await cargarLote(lote); }
            // Cargar Herramientas
            for(let herr of CONFIG_HERRAMIENTAS) { await cargarHerramientasSimple(herr); }
        }

        iniciar();
    </script>
</body>
</html>
