<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almacén y Obligaciones | Contrato 113</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { background-color: #f4f6f9; padding-bottom: 80px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card-box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .header-almacen { background: linear-gradient(90deg, #0043a8 0%, #0d6efd 100%); color: white; padding: 15px 0; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .progress-bar { transition: width 1.5s ease-in-out; font-weight: bold; font-size: 0.75rem; }
        .text-faltante { color: #dc3545; font-weight: 700; }
        .text-completo { color: #adb5bd; font-size: 0.9em; }
        .btn-action { font-size: 0.75rem; margin-right: 4px; margin-bottom: 5px; border-radius: 4px; padding: 4px 8px; }
        .btn-whatsapp { background-color: #25D366; color: white; border: none; }
        .btn-excel { background-color: #217346; color: white; border: none; }
        .badge-pendiente { background-color: #dc3545; color: white; }
        .badge-proceso { background-color: #ffc107; color: black; }
        .badge-cumplido { background-color: #198754; color: white; }
        .sticky-header { position: sticky; top: 0; background: white; z-index: 10; }
    </style>
</head>
<body>

    <div class="header-almacen">
        <div class="container d-flex justify-content-between align-items-center">
            <h4 class="m-0"><i class="fas fa-clipboard-list"></i> CONTROL 113 - dw</h4>
            <a href="index.html" class="btn btn-light btn-sm fw-bold shadow-sm"><i class="fas fa-home"></i> Inicio</a>
        </div>
    </div>

    <div class="container">
        <div class="card-box border-start border-4 border-warning" id="seccion-obligaciones">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="text-dark m-0"><i class="far fa-calendar-alt text-warning"></i> Control de Obligaciones</h5>
                <div class="btn-group">
                    <button onclick="enviarWhatsAppObligaciones()" class="btn btn-whatsapp btn-action"><i class="fab fa-whatsapp"></i> WhatsApp</button>
                    <button onclick="exportarExcel('tabla-exportar-obligaciones', 'Reporte_Obligaciones')" class="btn btn-excel btn-action"><i class="fas fa-file-excel"></i> Excel</button>
                </div>
            </div>
            <div class="table-responsive">
                <table class="table table-hover table-sm mb-0" id="tabla-exportar-obligaciones" style="font-size: 0.85rem;">
                    <thead class="table-light">
                        <tr>
                            <th class="text-center">Item</th>
                            <th>Obligación</th>
                            <th class="text-center">Vence</th>
                            <th class="text-center">Restan</th>
                            <th class="text-center">Estado</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-obligaciones">
                        <tr><td colspan="5" class="text-center py-3 text-muted">Cargando cronograma...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div id="contenedor-lotes"></div>

        <div class="card-box border-top border-4 border-info">
            <h5 class="text-info mb-3"><i class="fas fa-tools"></i> Checklist Herramientas Global</h5>
            <div id="contenedor-herramientas"></div>
        </div>
    </div>

    <script>
        const timestamp = new Date().getTime();
        const DOC_BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTw5wsNPW2SZyorWh9hOoHe2LcZgKkdpS29OziFQFPs-Oh1g9yCP8yNSVwAtk8SETKBbRkqmE47l_co/pub?single=true&output=csv';

        // Configuración de los datos
        const CONFIG = {
            obligaciones: { gid: '0' },
            lotes: [
                { id: '1', nombre: 'Lote 1: Estructuras', gid: '1555920355', color: 'primary' },
                { id: '2', nombre: 'Lote 2: Equipos', gid: '1584833780', color: 'success' },
                { id: '3', nombre: 'Lote 3: Materiales', gid: '948956372', color: 'info' },
                { id: 'adi', nombre: 'Adicionales', gid: '404296762', color: 'secondary' }
            ],
            herramientas: [
                { nombre: 'Herramientas Lote 1', gid: '438228635' },
                { nombre: 'Herramientas Lote 3', gid: '533666501' }
            ]
        };

        function parsearCSV(texto) {
            const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
            return texto.split(regex).map(c => c.replace(/^"|"$/g, '').trim());
        }

        // 1. Cargar Obligaciones
        async function cargarObligaciones() {
            const tbody = document.getElementById('tabla-obligaciones');
            try {
                const res = await fetch(`${DOC_BASE}&gid=${CONFIG.obligaciones.gid}&t=${timestamp}`);
                const data = await res.text();
                const filas = data.split(/\r?\n/).slice(1);
                tbody.innerHTML = '';

                filas.forEach(f => {
                    let c = parsearCSV(f);
                    if (c.length < 5) return;
                    
                    let estado = c[4].toLowerCase();
                    let badge = estado.includes('cumpli') ? 'badge-cumplido' : (estado.includes('proceso') ? 'badge-proceso' : 'badge-pendiente');
                    
                    tbody.innerHTML += `
                        <tr>
                            <td class="text-center fw-bold">${c[0]}</td>
                            <td>${c[1]}</td>
                            <td class="text-center text-danger small">${c[2]}</td>
                            <td class="text-center"><span class="badge bg-dark">${c[3] || '-'}</span></td>
                            <td class="text-center"><span class="badge ${badge}">${c[4]}</span></td>
                        </tr>`;
                });
            } catch (e) { tbody.innerHTML = 'Error al cargar'; }
        }

        // 2. Cargar Lotes Dinámicamente
        async function cargarLotes() {
            const contenedor = document.getElementById('contenedor-lotes');
            
            for (let lote of CONFIG.lotes) {
                const sectionHtml = `
                    <div class="card-box border-start border-4 border-${lote.color}" id="sec-${lote.id}">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <h6 class="text-${lote.color} fw-bold m-0"><i class="fas fa-box"></i> ${lote.nombre}</h6>
                            <div class="btn-group">
                                <button onclick="exportarExcel('tab-${lote.id}', 'Reporte_${lote.id}')" class="btn btn-excel btn-action"><i class="fas fa-file-excel"></i></button>
                                <button onclick="enviarWhatsApp('${lote.nombre}', 'body-${lote.id}')" class="btn btn-whatsapp btn-action"><i class="fab fa-whatsapp"></i></button>
                            </div>
                        </div>
                        <div class="progress mb-2" style="height: 18px;">
                            <div id="bar-${lote.id}" class="progress-bar bg-${lote.color} progress-bar-striped progress-bar-animated" style="width: 0%">0%</div>
                        </div>
                        <div class="table-responsive" style="max-height: 300px;">
                            <table class="table table-sm table-bordered table-hover" id="tab-${lote.id}" style="font-size: 0.8rem;">
                                <thead class="table-light sticky-header">
                                    <tr><th>Cód.</th><th>Descripción</th><th>Total</th><th>Llegó</th><th>Falta</th></tr>
                                </thead>
                                <tbody id="body-${lote.id}"></tbody>
                            </table>
                        </div>
                    </div>`;
                contenedor.innerHTML += sectionHtml;

                try {
                    const res = await fetch(`${DOC_BASE}&gid=${lote.gid}&t=${timestamp}`);
                    const data = await res.text();
                    const filas = data.split(/\r?\n/).slice(1);
                    const tbody = document.getElementById(`body-${lote.id}`);
                    let tI = 0, tL = 0;

                    filas.forEach(f => {
                        let c = parsearCSV(f);
                        if (c.length < 4 || (!c[2] && !c[3])) return;
                        let tot = parseFloat(c[2]) || 0;
                        let lle = parseFloat(c[3]) || 0;
                        let fal = tot - lle;
                        tI += tot; tL += lle;

                        tbody.innerHTML += `
                            <tr>
                                <td class="text-muted">${c[0]}</td>
                                <td>${c[1]}</td>
                                <td class="text-center">${tot}</td>
                                <td class="text-center fw-bold">${lle}</td>
                                <td class="text-center ${fal > 0 ? 'text-danger fw-bold' : 'text-muted'}">${fal > 0 ? fal : '-'}</td>
                            </tr>`;
                    });
                    let p = tI > 0 ? Math.round((tL / tI) * 100) : 0;
                    document.getElementById(`bar-${lote.id}`).style.width = p + '%';
                    document.getElementById(`bar-${lote.id}`).innerText = p + '%';
                } catch (e) { console.error("Error en " + lote.nombre); }
            }
        }

        // 3. Herramientas
        async function cargarHerramientas() {
            const cont = document.getElementById('contenedor-herramientas');
            for (let h of CONFIG.herramientas) {
                const idH = `h-${h.gid}`;
                cont.innerHTML += `<div class="mb-3"><h6>${h.nombre}</h6><div id="${idH}" class="table-responsive"></div></div>`;
                
                try {
                    const res = await fetch(`${DOC_BASE}&gid=${h.gid}&t=${timestamp}`);
                    const data = await res.text();
                    const filas = data.split(/\r?\n/).slice(1);
                    let html = '<table class="table table-sm table-striped table-bordered" style="font-size: 0.8rem;"><thead><tr class="table-info"><th>Herramienta</th><th>Req.</th><th>Obra</th></tr></thead><tbody>';
                    
                    filas.forEach(f => {
                        let c = parsearCSV(f);
                        if(c.length < 4) return;
                        html += `<tr><td>${c[1]}</td><td class="text-center">${c[2]}</td><td class="text-center fw-bold">${c[3]}</td></tr>`;
                    });
                    document.getElementById(idH).innerHTML = html + '</tbody></table>';
                } catch (e) { }
            }
        }

        // Utilidades
        function exportarExcel(id, nombre) {
            const wb = XLSX.utils.table_to_book(document.getElementById(id));
            XLSX.writeFile(wb, `${nombre}.xlsx`);
        }

        function enviarWhatsApp(titulo, bodyId) {
            let msg = `*REPORTE: ${titulo}*\n`;
            const filas = document.getElementById(bodyId).rows;
            for(let f of filas) {
                let c = f.cells;
                if(c[4].innerText !== "-") msg += `• ${c[1].innerText}: Falta ${c[4].innerText}\n`;
            }
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function enviarWhatsAppObligaciones() {
            let msg = `*📅 PENDIENTES DW*\n`;
            const filas = document.getElementById('tabla-obligaciones').rows;
            for(let f of filas) {
                if(f.innerHTML.includes('badge-pendiente') || f.innerHTML.includes('badge-proceso')) {
                    msg += `⚠️ ${f.cells[1].innerText} (Vence: ${f.cells[2].innerText})\n`;
                }
            }
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // Inicio
        window.onload = () => {
            cargarObligaciones();
            cargarLotes();
            cargarHerramientas();
        };
    </script>
</body>
</html>
