<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CONTROL 113 - Williams (dw)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; padding-bottom: 50px; }
        .header-blue { background: #0056b3; color: white; padding: 12px 20px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .card-custom { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 20px; padding: 15px; border-left: 5px solid #ffc107; }
        .table-scroll { max-height: 280px; overflow-y: auto; border: 1px solid #eee; }
        .badge-restante { background-color: #0dcaf0; color: white; border-radius: 12px; padding: 4px 10px; font-weight: bold; font-size: 0.85rem; }
        .text-limite { color: #dc3545; font-weight: bold; }
        .text-falta { color: #dc3545; font-weight: bold; }
        .btn-wa { background-color: #25D366; color: white; border: none; font-size: 0.8rem; padding: 5px 15px; }
    </style>
</head>
<body>

<div class="header-blue">
    <span><i class="fas fa-file-contract"></i> PANEL DE CONTROL CONTRATO 113</span>
    <span class="badge bg-light text-dark">dw</span>
</div>

<div class="container-fluid px-4">
    
    <div class="card-custom">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="m-0 text-dark"><i class="fas fa-calendar-check text-warning"></i> Control de Obligaciones</h5>
            <button class="btn btn-wa rounded-pill"><i class="fab fa-whatsapp"></i> Enviar Reporte</button>
        </div>
        <div class="table-responsive">
            <table class="table table-hover align-middle" style="font-size: 0.85rem;">
                <thead class="table-light">
                    <tr><th>Item</th><th>Obligación</th><th>Límite</th><th>Fecha Presentación</th><th class="text-center">Días Restantes</th><th>Estado</th></tr>
                </thead>
                <tbody id="tabla-obligaciones"></tbody>
            </table>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6">
            <div class="card-custom" style="border-left-color: #0d6efd;">
                <h6 class="text-primary fw-bold"><i class="fas fa-box"></i> Lote 1: Estructuras</h6>
                <div class="table-scroll"><table class="table table-sm table-striped"><tbody id="data-lote1"></tbody></table></div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card-custom" style="border-left-color: #6610f2;">
                <h6 style="color: #6610f2;" class="fw-bold"><i class="fas fa-cubes"></i> Lote 2: Componentes</h6>
                <div class="table-scroll"><table class="table table-sm table-striped"><tbody id="data-lote2"></tbody></table></div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card-custom" style="border-left-color: #0dcaf0;">
                <h6 class="text-info fw-bold"><i class="fas fa-paint-roller"></i> Lote 3: Acabados</h6>
                <div class="table-scroll"><table class="table table-sm table-striped"><tbody id="data-lote3"></tbody></table></div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card-custom" style="border-left-color: #dc3545;">
                <h6 class="text-danger fw-bold"><i class="fas fa-plus-circle"></i> Adicional y Repuestos</h6>
                <div class="table-scroll"><table class="table table-sm table-striped"><tbody id="data-adicional"></tbody></table></div>
            </div>
        </div>
    </div>

    <div class="row mt-2">
        <div class="col-md-6">
            <div class="card-custom" style="border-left-color: #198754;">
                <h6 class="text-success fw-bold"><i class="fas fa-tools"></i> Herramientas LOTE 1</h6>
                <div class="table-scroll">
                    <table class="table table-sm table-hover">
                        <thead class="table-dark"><tr><th>Item</th><th>Descripción</th><th>Total</th><th>Llegó</th><th>Falta</th></tr></thead>
                        <tbody id="herra-l1"></tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card-custom" style="border-left-color: #198754;">
                <h6 class="text-success fw-bold"><i class="fas fa-wrench"></i> Herramientas LOTE 3</h6>
                <div class="table-scroll">
                    <table class="table table-sm table-hover">
                        <thead class="table-dark"><tr><th>Item</th><th>Descripción</th><th>Total</th><th>Llegó</th><th>Falta</th></tr></thead>
                        <tbody id="herra-l3"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTw5wsNPW2SZyorWh9hOoHe2LcZgKkdpS29OziFQFPs-Oh1g9yCP8yNSVwAtk8SETKBbRkqmE47l_co/pub?output=csv';
    
    // GIDs VERIFICADOS
    const GIDS = {
        OBLIG: '0',
        L1: '1555920355',
        L2: '1410118559', 
        L3: '1410118559', 
        ADIC: '123456789', // Cambiar por el GID real si no carga
        H1: '438228635',
        H3: '533666501'
    };

    // FUNCIÓN MAESTRA DE CARGA
    async function cargar(gid, elementId, modo) {
        try {
            const resp = await fetch(`${SHEET_URL}&gid=${gid}&t=${Date.now()}`);
            const data = await resp.text();
            const filas = data.split(/\r?\n/).slice(1);
            let html = '';

            filas.forEach(linea => {
                // EXPRESIÓN REGULAR PARA MANEJAR COMAS DENTRO DE COMILLAS
                const c = linea.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || linea.split(',');
                if (c.length < 3) return;

                const limpiar = (txt) => txt ? txt.replace(/"/g, '').trim() : '';

                if (modo === 'oblig') {
                    const estClass = limpiar(c[4]) === 'Cumplido' ? 'bg-success' : 'bg-danger';
                    html += `<tr>
                        <td>${limpiar(c[0])}</td>
                        <td>${limpiar(c[1])}</td>
                        <td class="text-limite">${limpiar(c[2])}</td>
                        <td>${limpiar(c[3])||'-'}</td>
                        <td class="text-center">${c[5]?`<span class="badge-restante">${limpiar(c[5])}</span>`:'-'}</td>
                        <td><span class="badge ${estClass}">${limpiar(c[4])}</span></td>
                    </tr>`;
                } else if (modo === 'herra') {
                    const t = parseInt(c[2]) || 0;
                    const l = parseInt(c[3]) || 0;
                    html += `<tr><td>${limpiar(c[0])}</td><td>${limpiar(c[1])}</td><td>${t}</td><td>${l}</td><td class="text-falta">${t-l}</td></tr>`;
                } else {
                    const f = (parseInt(c[2]) || 0) - (parseInt(c[3]) || 0);
                    html += `<tr><td><strong>${limpiar(c[0])}</strong></td><td>${limpiar(c[1])}</td><td>${c[2]||0}</td><td>${c[3]||0}</td><td class="text-danger">${f}</td><td>${f===0?'🟢':'🔴'}</td></tr>`;
                }
            });
            document.getElementById(elementId).innerHTML = html || '<tr><td colspan="5" class="text-center text-muted">Sin datos</td></tr>';
        } catch (e) { console.error("Error en " + elementId); }
    }

    // DISPARADOR INICIAL
    window.onload = () => {
        cargar(GIDS.OBLIG, 'tabla-obligaciones', 'oblig');
        cargar(GIDS.L1, 'data-lote1', 'lote');
        cargar(GIDS.L2, 'data-lote2', 'lote');
        cargar(GIDS.L3, 'data-lote3', 'lote');
        cargar(GIDS.ADIC, 'data-adicional', 'lote');
        cargar(GIDS.H1, 'herra-l1', 'herra');
        cargar(GIDS.H3, 'herra-l3', 'herra');
    };
</script>
</body>
</html>
