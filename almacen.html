  <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almacén y Obligaciones | Contrato 113</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { background-color: #f4f6f9; padding-bottom: 80px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card-box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .badge-pendiente { background-color: #dc3545; color: white; }
        .badge-proceso { background-color: #ffc107; color: black; }
        .badge-cumplido { background-color: #28a745; color: white; }
        .navbar-custom { background-color: #343a40; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 1.2rem; }
        .table-responsive { overflow-x: auto; }
        .btn-accion { margin-right: 5px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="navbar-custom">
        <i class="fas fa-warehouse"></i> CONTROL DE ALMACÉN Y OBLIGACIONES - CONTRATO 113
    </div>

    <div class="container mt-4">
        
        <div class="card-box">
            <h4 class="mb-3 text-primary"><i class="fas fa-tasks"></i> Obligaciones Contractuales</h4>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Item</th>
                            <th>Obligación</th>
                            <th>Vencimiento</th>
                            <th>Plazo</th> <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpo-obligaciones">
                        </tbody>
                </table>
            </div>
            <button onclick="enviarWhatsAppObligaciones()" class="btn btn-success mt-2">
                <i class="fab fa-whatsapp"></i> Reportar Alertas
            </button>
        </div>

        <hr>

        <div class="card-box">
            <h4 class="mb-3 text-success"><i class="fas fa-box"></i> Inventario Lote 1</h4>
            <div class="mb-3">
                <input type="text" id="buscadorInput" onkeyup="filtrarTabla()" class="form-control" placeholder="🔍 Buscar componente...">
            </div>
            <div class="table-responsive">
                <table class="table table-striped table-bordered" id="tabla-lote1">
                    <thead class="table-secondary">
                        <tr>
                            <th>Código</th>
                            <th>Componente</th>
                            <th>Cant. Contrato</th>
                            <th>Recibido</th>
                            <th>Falta</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpo-lote1">
                        </tbody>
                </table>
            </div>
            <div class="mt-3">
                <button onclick="exportarExcel()" class="btn btn-outline-success btn-accion"><i class="fas fa-file-excel"></i> Excel</button>
                <button onclick="exportarPDF()" class="btn btn-outline-danger btn-accion"><i class="fas fa-file-pdf"></i> PDF</button>
                <button onclick="imprimirTabla()" class="btn btn-outline-dark btn-accion"><i class="fas fa-print"></i> Imprimir</button>
                <button onclick="toggleHerramientas()" class="btn btn-outline-primary btn-accion"><i class="fas fa-tools"></i> Herramientas</button>
            </div>
        </div>

        <div id="lista-herramientas" class="card-box" style="display: none;">
            <h4 class="mb-3 text-warning"><i class="fas fa-wrench"></i> Kit de Herramientas</h4>
            <div class="table-responsive">
                <table class="table table-sm">
                    <thead>
                        <tr>
                            <th>Descripción</th>
                            <th>Cantidad</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpo-herramientas"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // CARGAR OBLIGACIONES CON PLAZO
        async function cargarObligaciones() {
            const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT1p2M3Y-Yj6C0T5-lM9mKq1f8uR0iK-lXp-vG7_V0qN5R-u-yX7YvK-q-L8N-yX_X_R-vG7_V0qN5R/pub?gid=0&output=csv&cache=" + new Date().getTime();
            try {
                const r = await fetch(url);
                const d = await r.text();
                const filas = d.split("\n").slice(1);
                const cuerpo = document.getElementById("cuerpo-obligaciones");
                cuerpo.innerHTML = "";

                filas.forEach(l => {
                    const f = l.split(",");
                    if (f.length >= 5) {
                        const venc = f[2];
                        const est = f[4].trim();
                        
                        // Cálculo de Plazo
                        let pTexto = "-";
                        let pClass = "bg-light text-dark";

                        if (est.toLowerCase() !== "cumplido" && venc.includes("/")) {
                            const part = venc.split('/');
                            const fObj = new Date(part[2], part[1]-1, part[0]);
                            const hoy = new Date();
                            hoy.setHours(0,0,0,0);
                            const dif = Math.ceil((fObj - hoy) / (1000*60*60*24));

                            if (!isNaN(dif)) {
                                pTexto = dif + " días";
                                if (dif <= 0) { pTexto = "Vencido"; pClass = "bg-danger text-white"; }
                                else if (dif <= 3) { pClass = "bg-warning text-dark"; } // NARANJA
                                else { pClass = "bg-info text-white"; }
                            }
                        }

                        let bEst = "bg-secondary";
                        if (est.toLowerCase().includes("pend")) bEst = "badge-pendiente";
                        if (est.toLowerCase().includes("proc")) bEst = "badge-proceso";
                        if (est.toLowerCase().includes("cumpl") || est.toLowerCase().includes("ok")) bEst = "badge-cumplido";

                        cuerpo.innerHTML += `<tr>
                            <td>${f[0]}</td>
                            <td class="fw-bold">${f[1]}</td>
                            <td>${venc}</td>
                            <td><span class="badge ${pClass}">${pTexto}</span></td>
                            <td><span class="badge ${bEst}">${f[4]}</span></td>
                        </tr>`;
                    }
                });
            } catch (e) { console.log(e); }
        }

        // CARGAR LOTE 1 (IGUAL AL ORIGINAL)
        async function cargarLote1() {
            const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT1p2M3Y-Yj6C0T5-lM9mKq1f8uR0iK-lXp-vG7_V0qN5R-u-yX7YvK-q-L8N-yX_X_R-vG7_V0qN5R/pub?gid=1510344498&output=csv";
            try {
                const r = await fetch(url);
                const d = await r.text();
                const filas = d.split("\n").slice(1);
                const cuerpo = document.getElementById("cuerpo-lote1");
                cuerpo.innerHTML = "";
                filas.forEach(l => {
                    const f = l.split(",");
                    if (f.length >= 5) {
                        const falta = parseInt(f[4]);
                        const rowCl = falta > 0 ? "table-warning" : "";
                        cuerpo.innerHTML += `<tr class="${rowCl}">
                            <td>${f[1]}</td>
                            <td>${f[2]}</td>
                            <td>${f[3]}</td>
                            <td class="text-success fw-bold">${f[5] || '0'}</td>
                            <td class="text-danger fw-bold">${f[4]}</td>
                        </tr>`;
                    }
                });
            } catch (e) { console.log(e); }
        }

        // CARGAR HERRAMIENTAS
        async function cargarHerramientas() {
            const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT1p2M3Y-Yj6C0T5-lM9mKq1f8uR0iK-lXp-vG7_V0qN5R-u-yX7YvK-q-L8N-yX_X_R-vG7_V0qN5R/pub?gid=1833772828&output=csv";
            try {
                const r = await fetch(url);
                const d = await r.text();
                const filas = d.split("\n").slice(1);
                const cuerpo = document.getElementById("cuerpo-herramientas");
                cuerpo.innerHTML = "";
                filas.forEach(l => {
                    const f = l.split(",");
                    if (f.length >= 2) {
                        cuerpo.innerHTML += `<tr><td>${f[0]}</td><td>${f[1]}</td></tr>`;
                    }
                });
            } catch (e) { console.log(e); }
        }

        // FUNCIONES DE UTILIDAD (ORIGINALES)
        function filtrarTabla() {
            let input = document.getElementById("buscadorInput").value.toUpperCase();
            let rows = document.getElementById("cuerpo-lote1").getElementsByTagName("tr");
            for (let i = 0; i < rows.length; i++) {
                let text = rows[i].getElementsByTagName("td")[1]?.textContent || "";
                rows[i].style.display = text.toUpperCase().includes(input) ? "" : "none";
            }
        }
        function toggleHerramientas() {
            const x = document.getElementById("lista-herramientas");
            x.style.display = x.style.display === "none" ? "block" : "none";
        }
        function exportarExcel() {
            const wb = XLSX.utils.table_to_book(document.getElementById('tabla-lote1'));
            XLSX.writeFile(wb, 'Inventario_Lote1.xlsx');
        }
        function exportarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = jsPDF();
            doc.text("Inventario Lote 1 - Contrato 113", 14, 15);
            doc.autoTable({ html: '#tabla-lote1', startY: 20 });
            doc.save('Inventario_Lote1.pdf');
        }
        function imprimirTabla() { window.print(); }

        function enviarWhatsAppObligaciones() {
            let mensaje = "*CONTROL OBLIGACIONES - dw*%0A%0A";
            const filas = document.getElementById("cuerpo-obligaciones").getElementsByTagName("tr");
            for (let row of filas) {
                const c = row.getElementsByTagName("td");
                if (!c[4].innerText.toLowerCase().includes("cumplido")) {
                    mensaje += `⚠️ *${c[1].innerText}*%0AVence: ${c[2].innerText} (Plazo: ${c[3].innerText})%0A%0A`;
                }
            }
            window.open(`https://wa.me/?text=${mensaje}`, '_blank');
        }

        cargarObligaciones();
        cargarLote1();
        cargarHerramientas();
    </script>
</body>
</html>
